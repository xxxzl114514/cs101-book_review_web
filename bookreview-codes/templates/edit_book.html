<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>编辑书籍信息</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename = 'css/style-new_book.css') }}"
    />
  </head>

  <body>
    <div class="new-container">
      <h2>编辑书籍信息</h2>
      <form enctype="multipart/form-data" id="bookForm" method="POST">
        <input
          type="text"
          name="title"
          placeholder="书名"
          value="{{ request.form['title'] or book['title'] }}"
          required
        />
        <input
          type="text"
          name="author"
          placeholder="作者"
          value="{{ request.form['author'] or book['author'] }}"
          required
        />
        <textarea name="profile" placeholder="简介" required>
{{ request.form['profile'] or book['profile'] }}</textarea
        >
        <label>(不上传新封面则保留原封面)</label>
        <input type="file" name="cover" accept="image/*" />
        <input
          type="text"
          name="isbn"
          placeholder="ISBN"
          value="{{ request.form['isbn'] or book['isbn'] }}"
          required
        />
        <!-- flash显示相关的信息 存储书名 作者 简介 图片 ISBN等基本信息 -->
        {% if get_flashed_messages() %}
        <div class="flash-container">
          {% for message in get_flashed_messages() %}
          <div class="alert alert-danger">{{ message }}</div>
          {% endfor %}
        </div>
        {% endif %}
        <button type="submit">保存</button>
      </form>
    </div>
    <script src="{{ url_for('static', filename = 'js/script-new_book.js') }}"></script>
  </body>
</html>
