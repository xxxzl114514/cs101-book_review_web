<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>注册</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename = 'css/style-register.css') }}"
    />
  </head>
  <!--注册界面的相关信息-->
  <body>
    <a href="{{ url_for('login') }}" class="back-button">&#60;&#60;登录</a>
    <!-- 返回登录界面按钮 -->
    <div class="register-container">
      <form id="registerForm" class="register-form" method="POST">
        <h2>注册</h2>
        <div class="form-group">
          <label for="username">用户名</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="请输入用户名"
            value="{{ request.form['username'] }}"
            required
          />
          <!--输入用户名-->
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="请输入密码"
            required
          />
          <!--输入密码（第一次）-->
        </div>
        <div class="form-group">
          <label for="confirmPassword">确认密码</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="请再次输入密码"
            required
          />
          <!--重新输入密码（第二次）-->
        </div>
        <div class="form-group">
          <label for="securityQuestion">密保问题</label>
          <input
            type="text"
            id="securityQuestion"
            name="securityQuestion"
            placeholder="请输入密保问题"
            value="{{ request.form['securityQuestion'] }}"
            required
          />
          <!--输入以后找回密码需要使用的密保问题-->
        </div>
        <div class="form-group">
          <label for="securityAnswer">密保答案</label>
          <input
            type="text"
            id="securityAnswer"
            name="securityAnswer"
            placeholder="请输入密保答案"
            value="{{ request.form['securityAnswer'] }}"
            required
          />
          <!--输入以后找回密码需要使用的密保问题所对应的密保答案-->
        </div>
        {% if get_flashed_messages() %}
        <div class="flash-container">
          {% for message in get_flashed_messages() %}
          <div class="alert alert-danger">{{ message }}</div>
          {% endfor %}
        </div>
        {% endif %}
        <button type="submit" class="register-button">注册</button>
      </form>
    </div>
  </body>
</html>
